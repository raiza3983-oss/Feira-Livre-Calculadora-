name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Resolve o aviso que você recebeu
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Esta etapa transforma seu HTML/JS em um projeto Android
      - name: Build APK
        uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: "." # Se seu index.html estiver na raiz
          app-name: "MeuAppGemini"
          output-folder-path: "output"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aplicativo-instalavel
          path: output/
