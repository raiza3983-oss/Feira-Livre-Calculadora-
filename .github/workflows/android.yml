name: Build Android APK AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - run: npm install

      - run: npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - run: npm run build

      - run: npx cap add android || true

      - run: npx cap sync android

      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - run: cd android && ./gradlew bundleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: AAB
          path: android/app/build/outputs/bundle/debug/app-debug.aab
