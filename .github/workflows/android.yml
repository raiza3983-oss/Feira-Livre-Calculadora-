name: Build APK AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependências
        run: npm install

      - name: Instalar Capacitor 6
        run: |
          npm uninstall @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/core@6.1.2 @capacitor/cli@6.1.2 @capacitor/android@6.1.2

      - name: Criar capacitor.config.ts
        run: |
          echo "import type { CapacitorConfig } from '@capacitor/cli';" > capacitor.config.ts
          echo "const config: CapacitorConfig = {" >> capacitor.config.ts
          echo "appId: 'com.feiralivre.app'," >> capacitor.config.ts
          echo "appName: 'Feira Livre'," >> capacitor.config.ts
          echo "webDir: 'dist'," >> capacitor.config.ts
          echo "bundledWebRuntime: false," >> capacitor.config.ts
          echo "};" >> capacitor.config.ts
          echo "export default config;" >> capacitor.config.ts

      - name: Build Vite
        run: npm run build

      - name: Criar Android
        run: npx cap add android

      - name: Sync Android
        run: npx cap sync android

      - name: Permissão Gradle
        run: chmod +x android/gradlew

      - name: Gerar APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Gerar AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
