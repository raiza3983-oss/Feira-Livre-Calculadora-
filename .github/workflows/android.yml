name: Android APK AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Instalar Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Criar capacitor.config.ts
        run: |
          echo "import type { CapacitorConfig } from '@capacitor/cli';" > capacitor.config.ts
          echo "const config: CapacitorConfig = {" >> capacitor.config.ts
          echo "appId: 'com.feiralivre.app'," >> capacitor.config.ts
          echo "appName: 'Feira Livre'," >> capacitor.config.ts
          echo "webDir: 'dist'," >> capacitor.config.ts
          echo "bundledWebRuntime: false," >> capacitor.config.ts
          echo "};" >> capacitor.config.ts
          echo "export default config;" >> capacitor.config.ts

      - name: Build Vite
        run: npm run build

      - name: Criar Android
        run: npx cap add android

      - name: Corrigir Java Capacitor
        run: |
          find android -type f -name "*.gradle" -exec sed -i 's/VERSION_21/VERSION_17/g' {} +
          find android -type f -name "*.gradle" -exec sed -i "s/jvmTarget = '21'/jvmTarget = '17'/g" {} +
          find android -type f -name "*.gradle" -exec sed -i 's/JavaLanguageVersion.of(21)/JavaLanguageVersion.of(17)/g' {} +

      - name: Mostrar build.gradle
        run: cat android/app/build.gradle

      - name: Sync Android
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Permissão Gradle
        run: chmod +x android/gradlew

      - name: Gerar APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Gerar AAB
        run: |
          cd android
          ./gradlew bundleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
