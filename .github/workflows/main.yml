name: Build Android APK AAB

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Build Vite
        run: npm run build

      - name: Instalar Capacitor
        run: |
          npm install @capacitor/core
          npm install @capacitor/cli
          npm install @capacitor/android

      - name: Inicializar Capacitor
        run: |
          npx cap init FeiraLivre com.feiralivre.app --web-dir dist

      - name: Adicionar Android
        run: npx cap add android

      - name: Sincronizar Android
        run: npx cap sync android

      - name: Dar permissão gradlew
        run: chmod +x android/gradlew

      - name: Gerar APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Gerar AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/debug/app-debug.aab
